apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-backend
  labels:
    app: cloud-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-backend
  template:
    metadata:
      labels:
        app: cloud-backend
    spec:
      containers:
      - name: cloud-backend
        image: bakcned:1.0.0
        ports:
        - containerPort: 5000
        resources:
          requests: &requests
            cpu: "100m"
            memory: "500Mi"
          limits: *requests
        livenessProbe:
          exec:
            command:
            - ["curl", "127.0.0.1:5000/healthcheck"] # TODO: Change the address to backend service name
          initialDelaySeconds: 10
          timeoutSeconds: 1
          periodSeconds: 3
          failureThreshold: 5
        
      
