
services:
  db:
    image: postgres:15.17
    environment:
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "postgres"
    container_name: "cloud-db"
    volumes:
     - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - database-network   
  backend:
    image: cloud-systems/backend
    build:
      context: ..
      dockerfile: ./stage_3/backend/Dockerfile
    container_name: "cloud-backend"
    depends_on:
      db: 
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      DATABASE_PORT: 5432
      DATABASE_HOST: "db"
    networks:
      - backend-network
      - database-network
        
  frontend:
    image: cloud-systems/frontend
    build:
      context: ..
      dockerfile: ./stage_3/frontend/Dockerfile
    container_name: "cloud-frontend"
    environment:
      BACKEND_HOST: "backend"
      BACKEND_PORT: 5000
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend: 
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:80"
    networks:
      - backend-network
# TODO: add healthcheck here

networks:
  backend-network:
    driver: bridge
  database-network:
    driver: bridge