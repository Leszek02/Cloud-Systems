
services:
  db:
    image: postgres:15.17
    # ports:
    #   - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "postgres"
    container_name: "postgres-db"
    volumes:
     - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"] # Probably should adjust parameters here
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      
  backend:
    image: cloud-systems/backend
    build:
      dockerfile: ./backend
    depends_on:
      db: 
        condition: service_healthy
    # ports: 
    #  - 5000:5000
        
  frontend: